services:
  redis:
    container_name: maxo-redis-fsm
    image: redis:7.4.3-alpine3.21
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: "redis-server --loglevel warning"
